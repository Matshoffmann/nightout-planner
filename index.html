<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightOut Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #f0eee8;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  .hero {
    background: linear-gradient(135deg, #0a0a0f 0%, #12101a 50%, #0d0d18 100%);
    padding: 3rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, rgba(255,80,120,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.2rem, 7vw, 3.5rem);
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ff5078, #ff9f50, #ffda50);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
  }

  .tagline {
    font-size: 1rem;
    color: rgba(240,238,232,0.5);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .form-section {
    max-width: 560px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .field-group { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(240,238,232,0.45);
    margin-bottom: 0.5rem;
  }

  input, select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    font-size: 1rem;
    color: #f0eee8;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input::placeholder { color: rgba(240,238,232,0.25); }

  input:focus, select:focus {
    border-color: rgba(255,80,120,0.5);
    background: rgba(255,80,120,0.05);
  }

  select option { background: #1a1a2e; color: #f0eee8; }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .toggle-row {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .toggle-btn {
    padding: 0.5rem 1rem;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(240,238,232,0.55);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: rgba(255,80,120,0.2);
    border-color: rgba(255,80,120,0.6);
    color: #ff8aaa;
  }

  .cta-btn {
    width: 100%;
    margin-top: 1.5rem;
    padding: 1rem;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #ff5078, #ff7d50);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .cta-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .cta-btn:active { transform: translateY(0); }
  .cta-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0.5rem 0 1.5rem;
  }

  .results {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
    display: none;
  }

  .results.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
  }

  .budget-pill {
    background: rgba(80,255,160,0.12);
    border: 1px solid rgba(80,255,160,0.3);
    color: #50ffa0;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
  }

  .plan-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .plan-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 3px 0 0 3px;
  }

  .card-pregame::before { background: linear-gradient(to bottom, #ffda50, #ff9f50); }
  .card-bars::before    { background: linear-gradient(to bottom, #ff5078, #c050ff); }
  .card-club::before    { background: linear-gradient(to bottom, #5078ff, #50c8ff); }
  .card-transport::before { background: linear-gradient(to bottom, #50ffa0, #50ffda); }
  .card-tips::before    { background: linear-gradient(to bottom, #ffda50, #50ffa0); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
  }

  .card-phase {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
  }

  .card-time {
    font-size: 0.78rem;
    color: rgba(240,238,232,0.35);
    margin-top: 2px;
  }

  .card-cost {
    font-size: 0.85rem;
    color: rgba(240,238,232,0.5);
    background: rgba(255,255,255,0.06);
    padding: 0.2rem 0.6rem;
    border-radius: 8px;
    white-space: nowrap;
  }

  .card-content {
    font-size: 0.92rem;
    line-height: 1.65;
    color: rgba(240,238,232,0.75);
    white-space: pre-wrap;
  }

  .loading-state {
    text-align: center;
    padding: 2.5rem 0;
    color: rgba(240,238,232,0.45);
    font-size: 0.9rem;
  }

  .pulse-ring {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid rgba(255,80,120,0.4);
    margin: 0 auto 1rem;
    animation: pulse 1.5s ease-out infinite;
  }

  @keyframes pulse {
    0%   { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.4s steps(4, end) infinite;
  }

  @keyframes dots {
    0%,20%  { content: ''; }
    40%     { content: '.'; }
    60%     { content: '..'; }
    80%,100%{ content: '...'; }
  }

  .error-msg {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080;
    padding: 1rem;
    border-radius: 12px;
    font-size: 0.9rem;
    text-align: center;
  }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .stat-mini {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 0.75rem;
    text-align: center;
  }

  .stat-mini-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: #ff8aaa;
  }

  .stat-mini-lbl {
    font-size: 0.7rem;
    color: rgba(240,238,232,0.35);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }

  .reset-btn {
    width: 100%;
    padding: 0.75rem;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(240,238,232,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: rgba(255,80,120,0.4);
    color: #ff8aaa;
  }

  .footer-note {
    text-align: center;
    font-size: 0.75rem;
    color: rgba(240,238,232,0.2);
    margin-top: 2rem;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="logo">NightOut.</div>
  <div class="tagline">Your AI party planner — budget-smart, vibe-perfect</div>
</div>

<div class="form-section" id="formSection">

  <div class="field-group">
    <label>City</label>
    <input type="text" id="city" placeholder="e.g. Málaga, Barcelona, Sevilla..." value="Málaga" />
  </div>

  <div class="grid-2">
    <div class="field-group">
      <label>Budget per person (€)</label>
      <input type="number" id="budget" placeholder="e.g. 50" min="10" max="500" />
    </div>
    <div class="field-group">
      <label>Group size</label>
      <input type="number" id="groupSize" placeholder="e.g. 4" min="1" max="20" />
    </div>
  </div>

  <div class="field-group">
    <label>Vibe</label>
    <div class="toggle-row" id="vibeToggle">
      <button class="toggle-btn active" data-val="party">🎉 Party</button>
      <button class="toggle-btn" data-val="chill bars">🍻 Chill Bars</button>
      <button class="toggle-btn" data-val="rooftop & cocktails">🍹 Rooftop</button>
      <button class="toggle-btn" data-val="beach club">🏖️ Beach Club</button>
    </div>
  </div>

  <div class="field-group">
    <label>Night starts at</label>
    <select id="startTime">
      <option value="20:00">8 PM — Early bird</option>
      <option value="22:00" selected>10 PM — Normal</option>
      <option value="00:00">Midnight — Spanish style</option>
    </select>
  </div>

  <div class="divider"></div>

  <div class="field-group">
    <label>Extras (optional)</label>
    <input type="text" id="extras" placeholder="e.g. no shots, need dinner first, Erasmus crowd..." />
  </div>

  <button class="cta-btn" id="planBtn" onclick="generatePlan()">
    Plan My Night ✦
  </button>

</div>

<div class="results" id="resultsSection">
  <div class="loading-state" id="loadingState">
    <div class="pulse-ring"></div>
    <div>Building your perfect night<span class="loading-dots"></span></div>
  </div>
  <div id="planContent"></div>
</div>

<script>
const COHERE_API_KEY = 'qNCeTH3UfnkmNOH9GJGzV6GWreATxYyBHXhS5iK1';
let selectedVibe = 'party';

document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedVibe = btn.dataset.val;
  });
});

async function generatePlan() {
  const city      = document.getElementById('city').value.trim() || 'Málaga';
  const budget    = document.getElementById('budget').value || '50';
  const groupSize = document.getElementById('groupSize').value || '4';
  const startTime = document.getElementById('startTime').value;
  const extras    = document.getElementById('extras').value.trim();
  const total     = parseInt(budget) * parseInt(groupSize);

  const btn = document.getElementById('planBtn');
  btn.disabled = true;
  btn.textContent = 'Planning...';

  document.getElementById('formSection').style.display = 'none';
  const results = document.getElementById('resultsSection');
  results.classList.add('visible');
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('planContent').innerHTML = '';

  const prompt = `You are a fun, expert local nightlife guide. Create a complete night out plan.

City: ${city}
Budget per person: €${budget}
Group size: ${groupSize} people
Total budget: €${total}
Vibe: ${selectedVibe}
Start time: ${startTime}
${extras ? `Special requests: ${extras}` : ''}

Respond ONLY with valid JSON, no markdown, no backticks, no explanation. Use this exact structure:
{
  "city": "city name",
  "totalBudget": ${total},
  "vibeRating": "one fun sentence describing the vibe of this night",
  "phases": [
    {
      "phase": "Pre-Game",
      "time": "time range e.g. 22:00 - 23:30",
      "estimatedCost": "€X per person",
      "description": "2-3 sentences with specific suggestions. Be concrete, fun and local.",
      "type": "pregame"
    },
    {
      "phase": "Bar Crawl",
      "time": "time range",
      "estimatedCost": "€X per person",
      "description": "2-3 sentences with 2-3 specific bar names or street recommendations, what to drink.",
      "type": "bars"
    },
    {
      "phase": "Club / Late Night",
      "time": "time range",
      "estimatedCost": "€X-Y per person",
      "description": "2-3 sentences with specific club suggestions, cover charge, music style.",
      "type": "club"
    },
    {
      "phase": "Transport & Home",
      "time": "late night",
      "estimatedCost": "€X per person",
      "description": "Practical transport tips, best app to use in this city, safe budget estimate.",
      "type": "transport"
    },
    {
      "phase": "Pro Tips",
      "time": "",
      "estimatedCost": "",
      "description": "• tip one\\n• tip two\\n• tip three\\n• tip four",
      "type": "tips"
    }
  ]
}`;

  try {
    const response = await fetch('https://api.cohere.com/v2/chat', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${COHERE_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'command-r-plus',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 1200,
        temperature: 0.7
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.message || 'API error');
    }

    const data = await response.json();
    const raw = data.message?.content?.[0]?.text || '';

    let plan;
    try {
      const cleaned = raw.replace(/```json|```/g, '').trim();
      plan = JSON.parse(cleaned);
    } catch(e) {
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) plan = JSON.parse(match[0]);
      else throw new Error('Could not parse response');
    }

    renderPlan(plan, budget, groupSize);

  } catch(err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('planContent').innerHTML = `
      <div class="error-msg">Something went wrong: ${err.message}<br>Check your connection and try again.</div>
      <button class="reset-btn" onclick="resetForm()">← Try Again</button>
    `;
  }
}

function renderPlan(plan, budget, groupSize) {
  document.getElementById('loadingState').style.display = 'none';

  const phaseColors = {
    pregame:   'card-pregame',
    bars:      'card-bars',
    club:      'card-club',
    transport: 'card-transport',
    tips:      'card-tips'
  };

  let html = `
    <div class="results-header">
      <div class="results-title">Your night in ${plan.city}</div>
      <div class="budget-pill">€${budget}/person</div>
    </div>
    <p style="font-size:0.88rem;color:rgba(240,238,232,0.45);margin-bottom:1.25rem;font-style:italic;">"${plan.vibeRating}"</p>
    <div class="summary-bar">
      <div class="stat-mini">
        <div class="stat-mini-val">€${plan.totalBudget}</div>
        <div class="stat-mini-lbl">Total Budget</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-val">${groupSize}</div>
        <div class="stat-mini-lbl">People</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-val">${(plan.phases || []).filter(p => p.type !== 'tips').length}</div>
        <div class="stat-mini-lbl">Stops</div>
      </div>
    </div>
  `;

  (plan.phases || []).forEach(phase => {
    const colorClass = phaseColors[phase.type] || 'card-tips';
    html += `
      <div class="plan-card ${colorClass}">
        <div class="card-header">
          <div>
            <div class="card-phase">${phase.phase}</div>
            ${phase.time ? `<div class="card-time">${phase.time}</div>` : ''}
          </div>
          ${phase.estimatedCost ? `<div class="card-cost">${phase.estimatedCost}</div>` : ''}
        </div>
        <div class="card-content">${phase.description}</div>
      </div>
    `;
  });

  html += `
    <button class="reset-btn" onclick="resetForm()">← Plan another night</button>
    <div class="footer-note">Prices are estimates. Always carry a little extra cash.<br>Stay safe, drink water, look out for your crew. 🖤</div>
  `;

  document.getElementById('planContent').innerHTML = html;
}

function resetForm() {
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('resultsSection').classList.remove('visible');
  document.getElementById('planContent').innerHTML = '';
  document.getElementById('planBtn').disabled = false;
  document.getElementById('planBtn').textContent = 'Plan My Night ✦';
}
</script>
</body>
</html>
